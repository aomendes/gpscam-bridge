name: Desktop Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: desktop-windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.7.0

      - name: Build one-file exe
        working-directory: desktop-windows
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile --name GpsCamBridgeDesktop --paths src src\desktop_entry.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GpsCamBridgeDesktop-exe
          path: desktop-windows/dist/GpsCamBridgeDesktop.exe

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-windows/dist/GpsCamBridgeDesktop.exe
